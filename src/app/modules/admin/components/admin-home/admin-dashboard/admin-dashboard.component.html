<div class="card-grid">
  <mat-card routerLink="/adminuser/home/{{item.path}}" *ngFor="let item of items" appearance="outlined"
    class="example-card">
    <mat-card-content>
      <mat-icon>{{item.icon}}</mat-icon>
      <mat-card-title>{{item.title}} </mat-card-title>
      <p>{{item.description}}</p>
    </mat-card-content>
  </mat-card>


</div>
