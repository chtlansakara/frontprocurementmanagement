<div class="center-container">
  <div class="table-container">


    <!-- filter for the table data -->
    <mat-form-field appearance="outline" class="filter">
      <mat-label>Filter</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Type a keyword to search.." #input>
    </mat-form-field>


    <!-- table -->
    <div class="mat-elevation-z5">
      <table mat-table [dataSource]="dataSource" matSort>


        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Vendor Name </th>
          <td mat-cell *matCellDef="let element"> {{element.name}} </td>
        </ng-container>

        <ng-container matColumnDef="registeredDate">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Registered Date</th>
          <td mat-cell *matCellDef="let element"> {{element.registeredDate | date: 'yyyy-MM-dd'}} </td>
        </ng-container>

        <ng-container matColumnDef="comments">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Comments</th>
          <td mat-cell *matCellDef="let element"> {{element.comments}} </td>
        </ng-container>


        <!-- actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> </th>
          <td mat-cell *matCellDef="let element;let i = index">

            <div class="example-flex-container">
              <div class="example-button-container">

                <a>
                  <button matTooltip="Edit Vendor" mat-mini-fab class="success-button" routerLink="/adminuser/home/vendors/update/
                  {{element.id}}">
                    <mat-icon>edit</mat-icon>
                  </button>
                </a>
                <a>
                  <button matTooltip="Delete Vendor" mat-mini-fab class="warn-button"
                    (click)="openDeleteDialog(element.id)">
                    <mat-icon>delete</mat-icon>
                  </button>
                </a>

              </div>
            </div>

          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      </table>
      <mat-paginator class="white-background" [pageSizeOptions]="[10, 20, 30]" showFirstLastButtons
        aria-label="Select page of designations">
      </mat-paginator>
    </div>
  </div>
</div>
