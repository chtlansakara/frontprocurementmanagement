<mat-card appearance="outlined">

  <form [formGroup]="vendorForm" (ngSubmit)="updateVendor()">

    <mat-card-content>

      <mat-grid-list cols="3" rowHeight="100px">

        <mat-grid-tile [colspan]="2">
          <mat-form-field appearance="outline">
            <mat-label>Vendor Name</mat-label>
            <input matInput type="text" formControlName="name" required>
            <!-- for error message -->
            <mat-error error *ngIf="vendorForm.get('name')?.hasError('required')">Name is required!
            </mat-error>
          </mat-form-field>
        </mat-grid-tile>

        <mat-grid-tile [colspan]="2">
          <mat-form-field appearance="outline">
            <mat-label>Registered Date</mat-label>
            <input matInput [matDatepicker]="datePicker" formControlName="registeredDate">
            <mat-datepicker-toggle matSuffix [for]="datePicker"></mat-datepicker-toggle>
            <mat-datepicker #datePicker></mat-datepicker>
            <!-- for error message -->
            <mat-error error *ngIf="vendorForm.get('registeredDate')?.hasError('required')">Date is required!
            </mat-error>
          </mat-form-field>
        </mat-grid-tile>



        <mat-grid-tile [colspan]="2">
          <mat-form-field appearance="outline">
            <mat-label>Comments</mat-label>
            <textarea matInput cdkTextareaAutosize #autosize="cdkTextareaAutosize" cdkAutosizeMinRows="1"
              cdkAutosizeMaxRows="5" formControlName="comments"> </textarea>
          </mat-form-field>
        </mat-grid-tile>

        <mat-grid-tile [colspan]="3">
          <div style="text-align: left;  width: 100%; display: flex; justify-content: start">
            <button type="reset" class="form-button" mat-stroked-button style="margin-right: 16px;">Reset</button>
            <button type="submit" mat-flat-button class="form-button" color="primary"
              [disabled]="vendorForm.invalid || vendorForm.pristine">Update</button>
          </div>
        </mat-grid-tile>



      </mat-grid-list>


    </mat-card-content>

  </form>
</mat-card>
