<button mat-icon-button [matMenuTriggerFor]="menu">
  <mat-icon [matBadge]="notifyService.unreadCount()" [matBadgeHidden]="notifyService.unreadCount() === 0"
    matBadgeColor="warn">
    notifications
  </mat-icon>
</button>

<mat-menu #menu="matMenu" class="notification-menu">
  <div class="notif-header">
    <span>Notifications</span>
    <button mat-button (click)="notifyService.markAllAsRead()">
      Mark all read
    </button>
  </div>

  @for (n of notifyService.notifications(); track n.id) {
  <div class="notif-item" [class.unread]="!n.isRead" (click)="notifyService.markAsRead(n.id)">
    <p>{{ n.message }}</p>
    <small>{{ n.createdAt | date:'short' }}</small>
  </div>
  } @empty {
  <div class="notif-empty">No notifications</div>
  }
</mat-menu>
