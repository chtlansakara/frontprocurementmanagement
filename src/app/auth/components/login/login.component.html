<div class="container">
  <mat-card>
    <mat-card-title>
      <div class="login-title">
        <img src="/public/LogoSuppliesHeader.svg" alt="supplies logo" class="login-logo">
        <span>Sign in</span>
      </div>

    </mat-card-title>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="loginUser()">

        <!-- email input field -->
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" placeholder="Email" required>
          <!-- for error message -->
          <mat-error *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
            Please enter a valid email.
          </mat-error>
        </mat-form-field>

        <!-- password input field -->
        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="Password"
            required>
          <!-- button-icon to see password as text -->
          <button class='visibility-button' type="button" mat-icon-button matSuffix
            (click)="togglePasswordVisibility()">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <!-- for error message -->
          <mat-error *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            Please enter a valid password.
          </mat-error>
        </mat-form-field>

        <!-- submit button field -->
        <button class='form-button' type="submit" mat-flat-button [disabled]="loginForm.invalid">
          Sign in
        </button>

      </form>
    </mat-card-content>

    <mat-card-actions>
      <button class='form-button' mat-button color="accent" (click)="showMessage()">Forgot Password?</button>
    </mat-card-actions>

  </mat-card>
</div>
