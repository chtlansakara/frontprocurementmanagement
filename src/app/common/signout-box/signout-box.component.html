<h5 mat-dialog-title style="font-size: 18px;">Confirm Sign out?</h5>
<mat-dialog-content>
  Are you sure you want to sign out?
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-raised-button mat-dialog-close>No</button>
  <button mat-flat-button [mat-dialog-close]="true" cdkFocusInital style="background-color: #D64545;;">Yes</button>
</mat-dialog-actions>
